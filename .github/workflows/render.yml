name: Render Video

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'Composition ID (e.g., FlowryIntro)'
        required: true
        default: 'FlowryIntro'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libdbus-1-3 libatk1.0-0t64 libasound2t64 \
            libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 libxdamage1 libgbm-dev \
            libcups2t64 libcairo2 libpango-1.0-0 libatk-bridge2.0-0t64 || \
          sudo apt-get install -y libnss3 libdbus-1-3 libatk1.0-0 libasound2 \
            libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 libxdamage1 libgbm-dev \
            libcups2 libcairo2 libpango-1.0-0 libatk-bridge2.0-0

      - name: Render video
        run: npx remotion render src/index.tsx ${{ github.event.inputs.composition }} out/${{ github.event.inputs.composition }}.mp4

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.composition }}
          path: out/${{ github.event.inputs.composition }}.mp4
